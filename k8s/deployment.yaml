apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-app
  namespace: dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: spring-app
  template:
    metadata:
      labels:
        app: spring-app
    spec:
      containers:
      - name: spring-app
        image: YOUR_DOCKERHUB_USERNAME/spring-postgres-app:latest
        ports:
        - containerPort: 8080
        envFrom:
        - secretRef:
            name: db-secret
